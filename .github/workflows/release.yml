name: Release Gem

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    if: github.repository == 'Gusto/rack-security-middleware'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: ruby

      - uses: rubygems/release-gem@v1.1.2
